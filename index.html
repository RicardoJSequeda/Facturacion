<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FacturaPro | Sistema de facturación</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563eb',
            ink: '#0f172a'
          },
          boxShadow: {
            soft: '0 20px 60px rgba(15, 23, 42, 0.08)'
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">
  <div class="flex min-h-screen">
    <aside class="hidden w-72 flex-col bg-ink text-white lg:flex">
      <div class="border-b border-white/10 p-6">
        <p class="text-sm uppercase tracking-[0.35em] text-blue-200">FacturaPro</p>
        <h1 class="mt-2 text-2xl font-black">Ferretería Real</h1>
      </div>
      <nav class="flex-1 space-y-2 p-4" id="desktopNav"></nav>
      <div class="m-4 rounded-2xl bg-white/10 p-4 text-sm text-slate-200">
        <p class="font-semibold text-white">Caja activa</p>
        <p class="mt-1">Responsable: Admin</p>
        <p>Fondo inicial: <span id="cashFundSide">$0</span></p>
      </div>
    </aside>

    <main class="flex-1 overflow-x-hidden">
      <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 backdrop-blur">
        <div class="flex flex-wrap items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
          <div>
            <p class="text-sm font-semibold text-primary" id="todayLabel"></p>
            <h2 class="text-2xl font-black text-ink sm:text-3xl" id="pageTitle">Panel principal</h2>
          </div>
          <div class="flex items-center gap-3">
            <button id="backupBtn" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-bold hover:bg-slate-50">Exportar respaldo</button>
            <button id="newInvoiceBtn" class="rounded-xl bg-primary px-4 py-2 text-sm font-bold text-white shadow-lg shadow-blue-500/20 hover:bg-blue-700">Nueva factura</button>
          </div>
        </div>
        <nav class="flex gap-2 overflow-x-auto px-4 pb-3 lg:hidden" id="mobileNav"></nav>
      </header>

      <section class="p-4 sm:p-6 lg:p-8">
        <div id="view-dashboard" class="view space-y-6"></div>
        <div id="view-pos" class="view hidden space-y-6"></div>
        <div id="view-inventory" class="view hidden space-y-6"></div>
        <div id="view-clients" class="view hidden space-y-6"></div>
        <div id="view-cash" class="view hidden space-y-6"></div>
        <div id="view-reports" class="view hidden space-y-6"></div>
      </section>
    </main>
  </div>

  <div id="toast" class="fixed bottom-5 right-5 hidden rounded-2xl bg-ink px-5 py-3 text-sm font-bold text-white shadow-soft"></div>

  <script>
    const currency = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 });
    const state = {
      products: [
        { id: 1, code: '770101', name: 'Cemento gris 50kg', category: 'Construcción', stock: 42, min: 10, cost: 28000, price: 36500 },
        { id: 2, code: '770102', name: 'Taladro percutor 650W', category: 'Herramientas', stock: 8, min: 3, cost: 135000, price: 189900 },
        { id: 3, code: '770103', name: 'Pintura blanca galón', category: 'Pinturas', stock: 16, min: 6, cost: 41000, price: 58900 },
        { id: 4, code: '770104', name: 'Tornillo drywall 1" x 100', category: 'Tornillería', stock: 70, min: 20, cost: 5200, price: 8500 }
      ],
      clients: [
        { id: 1, name: 'Carlos Ramírez', phone: '300 555 0199', credit: 320000, due: '2026-07-28' },
        { id: 2, name: 'Constructora Norte', phone: '601 777 1010', credit: 1250000, due: '2026-08-05' },
        { id: 3, name: 'Venta mostrador', phone: 'N/A', credit: 0, due: '-' }
      ],
      cart: [],
      invoices: [
        { id: 'F-1001', client: 'Carlos Ramírez', total: 146000, cost: 112000, method: 'Crédito', date: '2026-07-14' },
        { id: 'F-1002', client: 'Venta mostrador', total: 248300, cost: 174000, method: 'Efectivo', date: '2026-07-15' }
      ],
      cash: { fund: 150000, income: 248300, expenses: 42000 },
      audit: ['Admin abrió caja diaria', 'Vendedor generó factura F-1002', 'Bodega ajustó stock de Cemento gris']
    };

    const navItems = [
      ['dashboard', 'Panel principal', '📊'], ['pos', 'Facturación POS', '🧾'], ['inventory', 'Inventario / Kardex', '📦'],
      ['clients', 'Clientes y cartera', '👥'], ['cash', 'Caja y gastos', '💰'], ['reports', 'Reportes', '📈']
    ];

    function money(value) { return currency.format(value || 0); }
    function byId(id) { return document.getElementById(id); }
    function toast(message) {
      const box = byId('toast');
      box.textContent = message;
      box.classList.remove('hidden');
      setTimeout(() => box.classList.add('hidden'), 2600);
    }

    function renderNav() {
      ['desktopNav', 'mobileNav'].forEach(target => {
        byId(target).innerHTML = navItems.map(([id, label, icon]) => `
          <button data-route="${id}" class="nav-btn flex w-full min-w-fit items-center gap-3 rounded-2xl px-4 py-3 text-left text-sm font-bold transition hover:bg-blue-600/20">
            <span>${icon}</span><span>${label}</span>
          </button>`).join('');
      });
      document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', () => showView(btn.dataset.route)));
    }

    function showView(route) {
      document.querySelectorAll('.view').forEach(view => view.classList.add('hidden'));
      byId(`view-${route}`).classList.remove('hidden');
      byId('pageTitle').textContent = navItems.find(item => item[0] === route)[1];
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('bg-blue-600', btn.dataset.route === route));
    }

    function statCard(title, value, detail, tone = 'blue') {
      return `<article class="rounded-3xl bg-white p-6 shadow-soft">
        <p class="text-sm font-bold text-slate-500">${title}</p>
        <h3 class="mt-3 text-3xl font-black text-${tone === 'red' ? 'red' : tone === 'green' ? 'emerald' : 'slate'}-700">${value}</h3>
        <p class="mt-2 text-sm text-slate-500">${detail}</p>
      </article>`;
    }

    function renderDashboard() {
      const sales = state.invoices.reduce((sum, inv) => sum + inv.total, 0);
      const costs = state.invoices.reduce((sum, inv) => sum + inv.cost, 0);
      const receivable = state.clients.reduce((sum, client) => sum + client.credit, 0);
      byId('view-dashboard').innerHTML = `
        <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
          ${statCard('Ventas del día', money(sales), 'Facturas generadas y ventas a crédito')}
          ${statCard('Utilidad bruta', money(sales - costs), 'Calculada con costo de productos', 'green')}
          ${statCard('Cuentas por cobrar', money(receivable), 'Cartera activa de clientes', 'red')}
          ${statCard('Productos bajos', state.products.filter(p => p.stock <= p.min).length, 'Alertas de reposición')}
        </div>
        <div class="grid gap-6 xl:grid-cols-3">
          <section class="rounded-3xl bg-white p-6 shadow-soft xl:col-span-2">
            <h3 class="text-xl font-black text-ink">Facturas recientes</h3>
            ${invoiceTable()}
          </section>
          <section class="rounded-3xl bg-white p-6 shadow-soft">
            <h3 class="text-xl font-black text-ink">Auditoría rápida</h3>
            <ul class="mt-4 space-y-3">${state.audit.map(item => `<li class="rounded-2xl bg-slate-50 p-3 text-sm">${item}</li>`).join('')}</ul>
          </section>
        </div>`;
    }

    function invoiceTable() {
      return `<div class="mt-4 overflow-x-auto"><table class="w-full text-left text-sm"><thead><tr class="text-slate-500"><th class="py-3">Factura</th><th>Cliente</th><th>Método</th><th>Total</th><th>Utilidad</th></tr></thead><tbody>${state.invoices.map(inv => `<tr class="border-t border-slate-100"><td class="py-3 font-bold">${inv.id}</td><td>${inv.client}</td><td>${inv.method}</td><td>${money(inv.total)}</td><td class="font-bold text-emerald-600">${money(inv.total - inv.cost)}</td></tr>`).join('')}</tbody></table></div>`;
    }

    function renderPos() {
      byId('view-pos').innerHTML = `
        <div class="grid gap-6 xl:grid-cols-[1.2fr_0.8fr]">
          <section class="rounded-3xl bg-white p-6 shadow-soft">
            <div class="flex flex-wrap items-center justify-between gap-3"><h3 class="text-xl font-black text-ink">Productos</h3><input id="productSearch" class="rounded-xl border border-slate-200 px-4 py-2" placeholder="Buscar o escanear código" /></div>
            <div id="productList" class="mt-4 grid gap-3 sm:grid-cols-2"></div>
          </section>
          <section class="rounded-3xl bg-white p-6 shadow-soft">
            <h3 class="text-xl font-black text-ink">Factura actual</h3>
            <select id="clientSelect" class="mt-4 w-full rounded-xl border border-slate-200 px-4 py-3">${state.clients.map(c => `<option>${c.name}</option>`).join('')}</select>
            <div id="cartList" class="mt-4 space-y-3"></div>
            <div class="mt-4 rounded-2xl bg-slate-50 p-4"><div class="flex justify-between"><span>Subtotal</span><b id="cartSubtotal">$0</b></div><div class="flex justify-between"><span>IVA incluido</span><b id="cartTax">$0</b></div><div class="mt-3 flex justify-between text-2xl font-black"><span>Total</span><span id="cartTotal">$0</span></div></div>
            <button id="payBtn" class="mt-4 w-full rounded-2xl bg-emerald-600 px-5 py-4 font-black text-white hover:bg-emerald-700">Generar factura</button>
          </section>
        </div>`;
      renderProducts(); renderCart();
      byId('productSearch').addEventListener('input', event => renderProducts(event.target.value));
      byId('payBtn').addEventListener('click', checkout);
    }

    function renderProducts(query = '') {
      const list = state.products.filter(p => `${p.code} ${p.name}`.toLowerCase().includes(query.toLowerCase()));
      byId('productList').innerHTML = list.map(p => `<button data-product="${p.id}" class="rounded-2xl border border-slate-100 p-4 text-left hover:border-blue-300 hover:bg-blue-50"><p class="text-xs font-bold text-slate-500">${p.code} · ${p.category}</p><h4 class="mt-1 font-black text-ink">${p.name}</h4><div class="mt-3 flex justify-between text-sm"><span>Stock: ${p.stock}</span><b>${money(p.price)}</b></div></button>`).join('');
      document.querySelectorAll('[data-product]').forEach(btn => btn.addEventListener('click', () => addToCart(Number(btn.dataset.product))));
    }

    function addToCart(id) {
      const item = state.cart.find(row => row.id === id);
      item ? item.qty++ : state.cart.push({ id, qty: 1 });
      renderCart();
    }

    function renderCart() {
      const cart = byId('cartList');
      if (!cart) return;
      cart.innerHTML = state.cart.length ? state.cart.map(row => { const p = state.products.find(item => item.id === row.id); return `<div class="flex items-center justify-between rounded-2xl border border-slate-100 p-3"><div><b>${p.name}</b><p class="text-sm text-slate-500">${row.qty} x ${money(p.price)}</p></div><button data-remove="${p.id}" class="text-red-500">Quitar</button></div>`; }).join('') : '<p class="rounded-2xl bg-slate-50 p-4 text-sm text-slate-500">Agrega productos a la factura.</p>';
      const subtotal = state.cart.reduce((sum, row) => sum + state.products.find(p => p.id === row.id).price * row.qty, 0);
      byId('cartSubtotal').textContent = money(Math.round(subtotal / 1.19));
      byId('cartTax').textContent = money(subtotal - Math.round(subtotal / 1.19));
      byId('cartTotal').textContent = money(subtotal);
      document.querySelectorAll('[data-remove]').forEach(btn => btn.addEventListener('click', () => { state.cart = state.cart.filter(row => row.id !== Number(btn.dataset.remove)); renderCart(); }));
    }

    function checkout() {
      if (!state.cart.length) return toast('Agrega productos antes de facturar');
      const total = state.cart.reduce((sum, row) => sum + state.products.find(p => p.id === row.id).price * row.qty, 0);
      const cost = state.cart.reduce((sum, row) => sum + state.products.find(p => p.id === row.id).cost * row.qty, 0);
      state.cart.forEach(row => state.products.find(p => p.id === row.id).stock -= row.qty);
      state.invoices.unshift({ id: `F-${1000 + state.invoices.length + 1}`, client: byId('clientSelect').value, total, cost, method: 'Efectivo', date: new Date().toISOString().slice(0, 10) });
      state.cash.income += total; state.audit.unshift(`Admin generó factura por ${money(total)}`); state.cart = [];
      renderAll(); showView('dashboard'); toast('Factura generada correctamente');
    }

    function renderInventory() {
      byId('view-inventory').innerHTML = `<section class="rounded-3xl bg-white p-6 shadow-soft"><h3 class="text-xl font-black text-ink">Inventario con alertas y Kardex</h3><div class="mt-4 overflow-x-auto"><table class="w-full text-left text-sm"><thead><tr class="text-slate-500"><th class="py-3">Código</th><th>Producto</th><th>Categoría</th><th>Stock</th><th>Costo</th><th>Precio</th><th>Estado</th></tr></thead><tbody>${state.products.map(p => `<tr class="border-t border-slate-100"><td class="py-3 font-bold">${p.code}</td><td>${p.name}</td><td>${p.category}</td><td>${p.stock}</td><td>${money(p.cost)}</td><td>${money(p.price)}</td><td><span class="rounded-full px-3 py-1 text-xs font-bold ${p.stock <= p.min ? 'bg-red-100 text-red-700' : 'bg-emerald-100 text-emerald-700'}">${p.stock <= p.min ? 'Reponer' : 'Disponible'}</span></td></tr>`).join('')}</tbody></table></div></section>`;
    }

    function renderClients() {
      byId('view-clients').innerHTML = `<section class="rounded-3xl bg-white p-6 shadow-soft"><h3 class="text-xl font-black text-ink">Clientes, crédito y vencimientos</h3><div class="mt-4 grid gap-4 md:grid-cols-3">${state.clients.map(c => `<article class="rounded-2xl border border-slate-100 p-4"><h4 class="font-black text-ink">${c.name}</h4><p class="text-sm text-slate-500">${c.phone}</p><p class="mt-4 text-sm">Saldo pendiente</p><b class="text-2xl ${c.credit ? 'text-red-600' : 'text-emerald-600'}">${money(c.credit)}</b><p class="mt-2 text-sm text-slate-500">Vence: ${c.due}</p></article>`).join('')}</div></section>`;
    }

    function renderCash() {
      const expected = state.cash.fund + state.cash.income - state.cash.expenses;
      byId('cashFundSide').textContent = money(state.cash.fund);
      byId('view-cash').innerHTML = `<div class="grid gap-4 md:grid-cols-3">${statCard('Fondo inicial', money(state.cash.fund), 'Apertura de caja')}${statCard('Entradas', money(state.cash.income), 'Ventas en efectivo', 'green')}${statCard('Salidas / gastos', money(state.cash.expenses), 'Gastos operativos', 'red')}</div><section class="rounded-3xl bg-white p-6 shadow-soft"><h3 class="text-xl font-black text-ink">Cierre de caja</h3><p class="mt-4 text-slate-500">Efectivo esperado</p><p class="text-4xl font-black text-ink">${money(expected)}</p><button class="mt-4 rounded-2xl bg-ink px-5 py-3 font-bold text-white" onclick="toast('Cierre guardado en auditoría')">Cerrar caja</button></section>`;
    }

    function renderReports() {
      const sales = state.invoices.reduce((sum, inv) => sum + inv.total, 0);
      const profit = state.invoices.reduce((sum, inv) => sum + inv.total - inv.cost, 0);
      byId('view-reports').innerHTML = `<div class="grid gap-4 md:grid-cols-3">${statCard('Ventas acumuladas', money(sales), 'Periodo actual')}${statCard('Utilidad real', money(profit), 'Venta menos costo', 'green')}${statCard('Margen promedio', `${Math.round((profit / sales) * 100)}%`, 'Rentabilidad')}</div><section class="rounded-3xl bg-white p-6 shadow-soft"><h3 class="text-xl font-black text-ink">Módulos listos para negocio real</h3><div class="mt-4 grid gap-3 md:grid-cols-2">${['Cuentas por cobrar', 'Caja diaria', 'Gastos', 'Kardex', 'Auditoría', 'Roles de usuario', 'Código de barras', 'Respaldos'].map(item => `<div class="rounded-2xl bg-slate-50 p-4 font-bold">✓ ${item}</div>`).join('')}</div></section>`;
    }

    function renderAll() { renderDashboard(); renderPos(); renderInventory(); renderClients(); renderCash(); renderReports(); }

    byId('todayLabel').textContent = new Date().toLocaleDateString('es-CO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    byId('newInvoiceBtn').addEventListener('click', () => showView('pos'));
    byId('backupBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob); const link = document.createElement('a');
      link.href = url; link.download = 'respaldo-facturapro.json'; link.click(); URL.revokeObjectURL(url);
      toast('Respaldo exportado');
    });
    renderNav(); renderAll(); showView('dashboard');
  </script>
</body>
</html>
